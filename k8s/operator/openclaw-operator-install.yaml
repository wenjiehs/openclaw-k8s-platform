# OpenClaw Operator 安装配置
# 用于管理 OpenClaw CR（自定义资源）的 Operator
# 
# 安装步骤：
# kubectl apply -f openclaw-operator-install.yaml
#
# 验证安装：
# kubectl get pods -n openclaw-system

---
# Operator 的 Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: openclaw-system
  labels:
    app: openclaw-operator

---
# Operator ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-operator
  namespace: openclaw-system

---
# Operator ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-operator
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]

---
# Operator ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-operator
subjects:
  - kind: ServiceAccount
    name: openclaw-operator
    namespace: openclaw-system

---
# OpenClaw CRD（自定义资源定义）
# 定义 OpenClawInstance 资源类型
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openclawinstances.openclaw.io
spec:
  group: openclaw.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                username:
                  type: string
                spec:
                  type: string
                  enum: ["basic", "standard", "enterprise"]
                wechatBotToken:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                accessURL:
                  type: string
                message:
                  type: string
  scope: Namespaced
  names:
    plural: openclawinstances
    singular: openclawinstance
    kind: OpenClawInstance
    shortNames:
      - oci

---
# Operator Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-operator
  namespace: openclaw-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-operator
  template:
    metadata:
      labels:
        app: openclaw-operator
    spec:
      serviceAccountName: openclaw-operator
      containers:
        - name: operator
          # 替换为实际的 Operator 镜像
          image: your-registry/openclaw-operator:latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
